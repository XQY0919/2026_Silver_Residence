<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI测试 - Silver Residence</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'Inter', sans-serif;
            min-height: 100vh;
            background: #f8f9fa;
            padding: 20px;
        }
        
        /* 容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #FF8A7A 0%, #FF6B00 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        /* 聊天区域 */
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* 消息气泡 */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
        }
        
        .user-message {
            align-self: flex-end;
            background: #FF8A7A;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            align-self: flex-start;
            background: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        /* 输入区域 */
        .input-container {
            display: flex;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }
        
        .input {
            flex: 1;
            height: 50px;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .input:focus {
            border-color: #FF8A7A;
            box-shadow: 0 0 0 4px rgba(255, 138, 122, 0.2);
        }
        
        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #FF8A7A;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 138, 122, 0.4);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF8A7A;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI聊天测试</h1>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <!-- 消息将在这里动态添加 -->
        </div>
        
        <div class="input-container">
            <input type="text" class="input" id="messageInput" placeholder="请输入消息...">
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>
    
    <script>
        // 获取DOM元素
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // 添加消息到聊天容器
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message ai-message';
            messageDiv.textContent = content;
            chatContainer.appendChild(messageDiv);
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 添加加载状态
        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message loading';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = `
                <span>AI正在思考</span>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 移除加载状态
        function removeLoading() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            if (loadingIndicator) {
                loadingIndicator.remove();
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 添加用户消息
            addMessage(message, true);
            // 清空输入框
            messageInput.value = '';
            // 添加加载状态
            addLoading();
            
            try {
                // 调用AI接口
                const response = await fetch('http://localhost:8080/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                // 移除加载状态
                removeLoading();
                // 添加AI响应
                addMessage(data.response);
            } catch (error) {
                console.error('发送消息失败:', error);
                removeLoading();
                addMessage('抱歉，发生了错误，请稍后重试');
            }
        }
        
        // 绑定发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);
        
        // 绑定输入框回车事件
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 初始化欢迎消息
        addMessage('你好！我是AI助手，有什么可以帮助你的吗？');
    </script>
</body>
</html>
