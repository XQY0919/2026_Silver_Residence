<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - Silver Residence</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decor bg-decor-1"></div>
    <div class="bg-decor bg-decor-2"></div>
    <div class="bg-decor bg-decor-3"></div>
    
    <div id="app">
        <!-- 登录卡片 -->
        <div class="glass-card" v-if="activeCard === 'login'">
            <h1 class="title">欢迎回来</h1>
            <div class="error-message" v-if="loginError">{{ loginError }}</div>
            <form class="form" @submit.prevent="login">
                <!-- 用户名输入框 -->
                <div class="input-container" :class="{ 'has-content': loginForm.username }">
                    <label class="input-label">用户名</label>
                    <input type="text" class="input" v-model="loginForm.username" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 密码输入框 -->
                <div class="input-container" :class="{ 'has-content': loginForm.password }">
                    <label class="input-label">密码</label>
                    <input type="password" class="input" v-model="loginForm.password" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 链接 -->
                <div class="links">
                    <a href="#" class="link">忘记密码？</a>
                    <a href="#" class="link" @click.prevent="switchCard('register')">注册账号</a>
                </div>
                
                <!-- 登录按钮 -->
                <button type="submit" class="login-btn" :disabled="isLoading">
                    {{ isLoading ? '登录中...' : '登录' }}
                </button>
            </form>
        </div>
        
        <!-- 注册卡片 -->
        <div class="glass-card" v-else-if="activeCard === 'register'">
            <h1 class="title">创建账号</h1>
            <div class="error-message" v-if="registerError">{{ registerError }}</div>
            <form class="form" @submit.prevent="register">
                <!-- 用户名输入框 -->
                <div class="input-container" :class="{ 'has-content': registerForm.username }">
                    <label class="input-label">用户名</label>
                    <input type="text" class="input" v-model="registerForm.username" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 密码输入框 -->
                <div class="input-container" :class="{ 'has-content': registerForm.password }">
                    <label class="input-label">密码</label>
                    <input type="password" class="input" v-model="registerForm.password" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 邮箱输入框 -->
                <div class="input-container" :class="{ 'has-content': registerForm.email }">
                    <label class="input-label">邮箱</label>
                    <input type="email" class="input" v-model="registerForm.email" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 电话输入框 -->
                <div class="input-container" :class="{ 'has-content': registerForm.phone }">
                    <label class="input-label">电话</label>
                    <input type="tel" class="input" v-model="registerForm.phone" @focus="handleFocus" @blur="handleBlur">
                </div>
                
                <!-- 链接 -->
                <div class="links">
                    <a href="#" class="link" @click.prevent="switchCard('login')">已有账号？登录</a>
                </div>
                
                <!-- 注册按钮 -->
                <button type="submit" class="login-btn" :disabled="isLoading">
                    {{ isLoading ? '注册中...' : '注册' }}
                </button>
            </form>
        </div>
    </div>
    
    <script src="JS/main.js"></script>
</body>
</html>
